name: Add slam achievement
description: Record a white or black slam at a tournament
title: "[Slam] "
labels:
  - add-slam
body:
  - type: markdown
    attributes:
      value: |
        Submit a new slam record. A pull request will be created automatically and merged after validation.

  - type: input
    id: player_name
    attributes:
      label: Player name
      description: Full name as it should appear on the leaderboard
      placeholder: e.g. Prashant Suryakant More
    validations:
      required: true

  - type: dropdown
    id: gender
    attributes:
      label: Gender
      options:
        - male
        - female
    validations:
      required: true

  - type: input
    id: district
    attributes:
      label: District
      placeholder: e.g. Mumbai, Mumbai Sub, Thane, Pune
    validations:
      required: true

  - type: dropdown
    id: slam_type
    attributes:
      label: Slam type
      options:
        - White slam
        - Black slam
    validations:
      required: true

  - type: input
    id: tournament_name
    attributes:
      label: Tournament name
      placeholder: e.g. 58th Senior Maharashtra State Carrom Championship
    validations:
      required: true

  - type: input
    id: match_number
    attributes:
      label: Match number
      description: Optional — leave blank if unknown
      placeholder: "44"

  - type: input
    id: set_number
    attributes:
      label: Set number
      placeholder: "2"

  - type: input
    id: board_number
    attributes:
      label: Board number
      placeholder: "1"

  - type: textarea
    id: notes
    attributes:
      label: Notes (optional)
      placeholder: Any extra context
