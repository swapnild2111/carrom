name: Add slam achievement
description: Record a white or black slam in singles or doubles
title: "[Slam] "
labels:
  - add-slam
body:
  - type: markdown
    attributes:
      value: |
        Submit a new slam record. A pull request will be created automatically and merged after validation.

  - type: input
    id: player_name
    attributes:
      label: Player name
      description: Full name as it should appear on the leaderboard
      placeholder: e.g. Swapnil Deshpande
    validations:
      required: true

  - type: dropdown
    id: slam_type
    attributes:
      label: Slam type
      options:
        - White slam
        - Black slam
    validations:
      required: true

  - type: dropdown
    id: tournament_format
    attributes:
      label: Tournament format
      options:
        - Singles
        - Doubles
    validations:
      required: true

  - type: input
    id: tournament_name
    attributes:
      label: Tournament name
      placeholder: e.g. Spring Club Open 2025
    validations:
      required: true

  - type: input
    id: date
    attributes:
      label: Date
      description: Use YYYY-MM-DD format
      placeholder: "2025-06-28"
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes (optional)
      description: Partner name for doubles, or other context
      placeholder: Partner name, round info, etc.
