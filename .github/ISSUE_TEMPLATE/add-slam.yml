name: Add slam
description: Record a white or black slam for a player
title: "[Slam] "
labels:
  - add-slam
body:
  - type: input
    id: player_id
    attributes:
      label: Player ID
      placeholder: kunal-raut
    validations:
      required: true
  - type: dropdown
    id: slam_type
    attributes:
      label: Slam type
      options:
        - white
        - black
    validations:
      required: true
  - type: dropdown
    id: source
    attributes:
      label: Source
      options:
        - club
        - youtube
        - tournament
    validations:
      required: true
  - type: input
    id: club_id
    attributes:
      label: Club ID (required if source is club)
  - type: input
    id: date
    attributes:
      label: Date (YYYY-MM-DD)
  - type: input
    id: tournament
    attributes:
      label: Tournament (optional)
  - type: input
    id: location
    attributes:
      label: Location (optional)
  - type: input
    id: video_url
    attributes:
      label: Video URL (optional)
  - type: input
    id: match_ref
    attributes:
      label: Match ref (optional)
