name: Add slam achievement
description: Increment a white or black slam count for a player
title: "[Slam] "
labels:
  - add-slam
body:
  - type: markdown
    attributes:
      value: |
        Add one slam to the Total slam leaderboard. A pull request will be created and merged after validation.

  - type: input
    id: player_name
    attributes:
      label: Player name
      placeholder: e.g. Kunal Raut
    validations:
      required: true

  - type: dropdown
    id: slam_type
    attributes:
      label: Slam type
      options:
        - White slam
        - Black slam
    validations:
      required: true

  - type: dropdown
    id: tournament_tier
    attributes:
      label: Tournament tier
      options:
        - Club
        - State & YouTube
    validations:
      required: true

  - type: input
    id: club_name
    attributes:
      label: Club name (optional)
      placeholder: e.g. Sai Carrom
