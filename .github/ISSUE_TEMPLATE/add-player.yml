name: Add player
description: Add or update a Thane District player profile
title: "[Player] "
labels:
  - add-player
body:
  - type: input
    id: full_name
    attributes:
      label: Full name
    validations:
      required: true
  - type: dropdown
    id: gender
    attributes:
      label: Gender
      options:
        - Male
        - Female
    validations:
      required: true
  - type: input
    id: club_ids
    attributes:
      label: Club IDs (comma-separated)
      placeholder: shakti-club, sai-carrom
  - type: input
    id: aliases
    attributes:
      label: Aliases (optional)
