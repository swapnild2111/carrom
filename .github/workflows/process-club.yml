name: Process club submission

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  apply-changes:
    if: contains(github.event.issue.labels.*.name, 'add-club')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify submitter is allowed
        id: auth
        run: |
          AUTHOR="${{ github.event.issue.user.login }}"
          if ! jq -e --arg u "$AUTHOR" '.allowedUsers | index($u)' data/admin-allowlist.json > /dev/null; then
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            gh issue close "${{ github.event.issue.number }}" --reason "not planned"
            exit 0
          fi
          echo "allowed=true" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        if: steps.auth.outputs.allowed == 'true'
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.auth.outputs.allowed == 'true'
        run: pip install -r scripts/requirements.txt

      - name: Save issue body
        if: steps.auth.outputs.allowed == 'true'
        run: gh issue view "${{ github.event.issue.number }}" --json body --jq .body > /tmp/issue-body.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update clubs from issue
        if: steps.auth.outputs.allowed == 'true'
        run: python scripts/add_club_from_issue.py /tmp/issue-body.md

      - name: Validate and rebuild
        if: steps.auth.outputs.allowed == 'true'
        run: |
          python scripts/validate_schema.py
          python scripts/build_derived.py

      - name: Commit and push to main
        if: steps.auth.outputs.allowed == 'true'
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/clubs.json static/data/
          if git diff --staged --quiet; then exit 1; fi
          git commit -m "data: add club from issue #${{ github.event.issue.number }}"
          git push origin main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Comment and close
        if: steps.auth.outputs.allowed == 'true' && steps.push.outputs.sha != ''
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body "✅ Club committed (${{ steps.push.outputs.sha }})."
          gh issue close "${{ github.event.issue.number }}" --reason "completed"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
