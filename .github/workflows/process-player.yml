name: Process player submission

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  create-pr:
    if: contains(github.event.issue.labels.*.name, 'add-player')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify submitter is allowed
        id: auth
        run: |
          AUTHOR="${{ github.event.issue.author.login }}"
          if ! jq -e --arg u "$AUTHOR" '.allowedUsers | index($u)' data/admin-allowlist.json > /dev/null; then
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            gh issue comment "${{ github.event.issue.number }}" --body "⛔ **Not processed** — \`$AUTHOR\` is not on the admin allowlist. Ask a repo owner to add your GitHub username to \`data/admin-allowlist.json\`."
            gh issue close "${{ github.event.issue.number }}" --reason "not planned"
            exit 0
          fi
          echo "allowed=true" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        if: steps.auth.outputs.allowed == 'true'
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.auth.outputs.allowed == 'true'
        run: pip install -r scripts/requirements.txt

      - name: Save issue body
        if: steps.auth.outputs.allowed == 'true'
        run: gh issue view "${{ github.event.issue.number }}" --json body --jq .body > /tmp/issue-body.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update player profiles from issue
        if: steps.auth.outputs.allowed == 'true'
        run: python scripts/add_player_from_issue.py /tmp/issue-body.md

      - name: Validate updated data
        if: steps.auth.outputs.allowed == 'true'
        run: python scripts/validate_data.py

      - name: Create pull request
        if: steps.auth.outputs.allowed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: data/player-${{ github.event.issue.number }}
          commit-message: "data: add player profile from issue #${{ github.event.issue.number }}"
          title: "Add player: issue #${{ github.event.issue.number }}"
          body: |
            Automated PR from issue #${{ github.event.issue.number }}.

            Updates `data/player-profiles.json` and rebuilds `data/players.json`.
          labels: auto-merge

      - name: Comment on issue
        if: steps.auth.outputs.allowed == 'true' && steps.cpr.outputs.pull-request-number != ''
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body "✅ Created PR #${{ steps.cpr.outputs.pull-request-number }}. It will auto-merge after validation passes."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on failure
        if: failure() && steps.auth.outputs.allowed == 'true'
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body "❌ Failed to process this submission. Check field values and try again."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
