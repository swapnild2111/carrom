name: Process player submission

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  apply-changes:
    if: contains(github.event.issue.labels.*.name, 'add-player')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify submitter is allowed
        id: auth
        run: |
          AUTHOR="${{ github.event.issue.user.login }}"
          if ! jq -e --arg u "$AUTHOR" '.allowedUsers | index($u)' data/admin-allowlist.json > /dev/null; then
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            gh issue comment "${{ github.event.issue.number }}" --body "⛔ **Not processed** — \`$AUTHOR\` is not on the admin allowlist. Ask a repo owner to add your GitHub username to \`data/admin-allowlist.json\`."
            gh issue close "${{ github.event.issue.number }}" --reason "not planned"
            exit 0
          fi
          echo "allowed=true" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        if: steps.auth.outputs.allowed == 'true'
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.auth.outputs.allowed == 'true'
        run: pip install -r scripts/requirements.txt

      - name: Save issue body
        if: steps.auth.outputs.allowed == 'true'
        run: gh issue view "${{ github.event.issue.number }}" --json body --jq .body > /tmp/issue-body.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update player profiles from issue
        if: steps.auth.outputs.allowed == 'true'
        run: python scripts/add_player_from_issue.py /tmp/issue-body.md

      - name: Validate updated data
        if: steps.auth.outputs.allowed == 'true'
        run: python scripts/validate_data.py

      - name: Commit and push to main
        if: steps.auth.outputs.allowed == 'true'
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/player-profiles.json data/players.json static/data/players.json
          if git diff --staged --quiet; then
            echo "No file changes produced from this issue."
            exit 1
          fi
          git commit -m "data: add player profile from issue #${{ github.event.issue.number }}"
          git push origin main
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Comment on issue
        if: steps.auth.outputs.allowed == 'true' && steps.push.outputs.sha != ''
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body "✅ Player profile committed to \`main\` (${{ steps.push.outputs.sha }}). Site will redeploy in ~1 minute."
          gh issue close "${{ github.event.issue.number }}" --reason "completed"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on failure
        if: failure() && steps.auth.outputs.allowed == 'true'
        run: |
          gh issue comment "${{ github.event.issue.number }}" --body "❌ Failed to process this submission. Check field values and try again."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
