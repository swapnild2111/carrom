<section class="charts">
  <h3>Statistics</h3>
  <div class="charts-grid">
    <div class="chart-card chart-wide">
      <h4>Top 10 players</h4>
      <div class="chart-wrap">
        <canvas id="chart-top-players" aria-label="Top 10 players by total slams"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <h4>White vs black</h4>
      <div class="chart-wrap chart-wrap-square">
        <canvas id="chart-white-black" aria-label="White versus black slam distribution"></canvas>
      </div>
    </div>
    <div class="chart-card">
      <h4>Club vs state</h4>
      <div class="chart-wrap chart-wrap-square">
        <canvas id="chart-tier" aria-label="Club versus state slam counts"></canvas>
      </div>
    </div>
    <div class="chart-card chart-wide">
      <h4>Top 10 breakdown by tier</h4>
      <div class="chart-wrap">
        <canvas id="chart-stacked" aria-label="Top 10 players slam breakdown by tier and type"></canvas>
      </div>
    </div>
  </div>
</section>
